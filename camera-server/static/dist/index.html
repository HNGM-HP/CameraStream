<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Camera Stream Receiver</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    .container { max-width: 720px; margin: 0 auto; padding: 32px 20px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    h1 span { color: #22c55e; margin-right: 8px; }
    .subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 32px; }

    .info-bar { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
    .info-pill { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 14px 20px; flex: 1; min-width: 140px; text-align: center; }
    .info-pill .value { font-size: 28px; font-weight: 700; }
    .info-pill .label { font-size: 12px; color: #94a3b8; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .info-pill.green .value { color: #22c55e; }
    .info-pill.blue .value { color: #60a5fa; }

    .client-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 18px 22px; margin-bottom: 12px; display: flex; align-items: center; gap: 16px; }
    .client-card .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .client-card .dot.streaming { background: #22c55e; animation: pulse 2s infinite; }
    .client-card .dot.connected { background: #f59e0b; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .client-info { flex: 1; min-width: 0; }
    .client-info .name { font-weight: 600; font-size: 15px; }
    .client-info .meta { font-size: 13px; color: #94a3b8; margin-top: 2px; }
    .client-stats { text-align: right; font-size: 13px; color: #64748b; white-space: nowrap; }
    .client-stats .fps { color: #60a5fa; font-weight: 600; font-size: 18px; }

    .empty { text-align: center; padding: 60px 20px; color: #475569; }
    .empty svg { opacity: 0.3; margin-bottom: 16px; }

    .footer { margin-top: 40px; text-align: center; color: #475569; font-size: 12px; }
    .footer code { background: #1e293b; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h1><span>●</span>Camera Stream Receiver</h1>
    <p class="subtitle">手机摄像头推流接收服务 — WebSocket H.264 视频流</p>

    <div class="info-bar">
      <div class="info-pill green">
        <div class="value" id="streamCount">0</div>
        <div class="label">推流中</div>
      </div>
      <div class="info-pill blue">
        <div class="value" id="totalConn">0</div>
        <div class="label">已连接</div>
      </div>
      <div class="info-pill">
        <div class="value" id="uptime">--</div>
        <div class="label">运行时间</div>
      </div>
    </div>

    <div id="clientList"></div>

    <div class="footer">
      <p>手机端连接：WebSocket <code>ws://&lt;本机IP&gt;:8055/api/camera-stream/&lt;设备ID&gt;</code> · LAN 发现：UDP :8057</p>
    </div>
  </div>

  <script>
  var startTime = Date.now();

  function fmtUptime(ms) {
    var s = Math.floor(ms / 1000);
    var m = Math.floor(s / 60); s %= 60;
    var h = Math.floor(m / 60); m %= 60;
    return h > 0 ? h + 'h ' + m + 'm' : m > 0 ? m + 'm ' + s + 's' : s + 's';
  }

  function render(clients) {
    var list = document.getElementById('clientList');
    if (!clients || !clients.length) {
      list.innerHTML = '<div class="empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="9" y1="15" x2="15" y2="15"/></svg><p>暂无设备连接</p><p style="font-size:12px;margin-top:4px">打开 Android Camera Stream App 并连接到本服务器</p></div>';
      document.getElementById('streamCount').textContent = '0';
      document.getElementById('totalConn').textContent = '0';
    } else {
      var streaming = clients.filter(function(c) { return c.state === 'streaming'; }).length;
      document.getElementById('streamCount').textContent = streaming;
      document.getElementById('totalConn').textContent = clients.length;
      list.innerHTML = clients.map(function(c) {
        var cls = c.state === 'streaming' ? 'streaming' : 'connected';
        var delta = c.last_frame_at ? ((Date.now() / 1000 - c.last_frame_at) * 1000).toFixed(0) + 'ms ago' : '--';
        return '<div class="client-card">'
          + '<div class="dot ' + cls + '"></div>'
          + '<div class="client-info">'
          + '<div class="name">' + esc(c.device_name || c.camera_id) + '</div>'
          + '<div class="meta">' + esc(c.resolution) + ' · ' + esc(c.codec) + ' · ' + esc(c.ip_address) + '</div>'
          + '</div>'
          + '<div class="client-stats"><div class="fps">' + (c.state === 'streaming' ? c.fps + ' fps' : '等待中') + '</div><div>' + delta + '</div></div>'
          + '</div>';
      }).join('');
    }
    document.getElementById('uptime').textContent = fmtUptime(Date.now() - startTime);
  }

  function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function poll() {
    fetch('/health').then(function(r) { return r.json(); }).then(function(data) {
      render(data.clients || []);
    }).catch(function() {
      document.getElementById('clientList').innerHTML = '<div class="empty"><p>服务未响应</p></div>';
    });
  }

  poll();
  setInterval(poll, 3000);
  </script>
</body>
</html>
